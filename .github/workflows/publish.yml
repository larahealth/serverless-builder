name: Publish
run-name: Publish prod / ${{ github.ref_name }}

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: larahealth/actions/.github/workflows/reusable-package-publish.yml@main
    secrets: inherit
    with:
      config_path: .github/sdlc.yml
      source_ref: ${{ github.ref_name }}
      source_ref_type: branch
      stage: dev
      aws_region: us-east-1
      report_role_to_assume: ${{ vars.SDLC_REPORT_ROLE_ARN || 'arn:aws:iam::705789155077:role/GitHub' }}
      report_bucket_override: ${{ vars.SDLC_REPORT_BUCKET || '' }}
      report_kms_key_id: ${{ vars.SDLC_REPORT_KMS_KEY_ID || '' }}
      release_log_api_url: https://api.releases.lara.health
      release_log_environment: prod
